            <script defer="" data-name="navigation-logic">
              document.addEventListener('DOMContentLoaded', function() {
                (function(){
                  const navToggle = document.getElementById("navToggle")
                  const navClose = document.getElementById("navClose")
                  const mobileOverlay = document.getElementById("mobileOverlay")

                  function openMenu() {
                    mobileOverlay.setAttribute("data-state", "open")
                    navToggle.setAttribute("aria-expanded", "true")
                    document.body.style.overflow = "hidden"
                  }

                  function closeMenu() {
                    mobileOverlay.setAttribute("data-state", "closed")
                    navToggle.setAttribute("aria-expanded", "false")
                    document.body.style.overflow = ""

                    setTimeout(() => {
                      if (mobileOverlay.getAttribute("data-state") === "closed") {
                        mobileOverlay.style.display = "none"
                      }
                    }, 400)
                  }

                  navToggle.addEventListener("click", () => {
                    mobileOverlay.style.display = "flex"
                    requestAnimationFrame(() => {
                      openMenu()
                    })
                  })

                  navClose.addEventListener("click", closeMenu)

                  mobileOverlay.addEventListener("click", (e) => {
                    if (e.target.classList.contains("navigation-mobile-link")) {
                      closeMenu()
                    }
                  })

                  window.addEventListener("resize", () => {
                    if (window.innerWidth > 767 && mobileOverlay.getAttribute("data-state") === "open") {
                      closeMenu()
                    }
                  })
                })()
              });
            </script>
          </div>
        </div>
