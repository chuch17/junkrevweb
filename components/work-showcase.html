  <body>
    <link rel="stylesheet" href="../style.css" />
    <div>
      <link href="./work-showcase.css" rel="stylesheet" />
      <div class="work-showcase-container1">
        <section aria-labelledby="work-showcase-title" class="work-showcase">
          <div class="work-showcase-container">
            <div class="work-showcase-header">
              <h2 id="work-showcase-title" class="section-title">
                Experience our Results
              </h2>
              <p class="section-content">
                Watch how we transform cluttered spaces into pristine
                properties. From residential junk removal to large-scale
                commercial cleanouts, our professional team handles it all with
                efficiency and care.
              </p>
            </div>
            <div class="work-showcase-video-wrapper">
              <div id="playerContainer" class="work-showcase-player-container">
                <video
                  id="showcaseVideo"
                  src="https://videos.pexels.com/video-files/34421895/14582049_640_360_30fps.mp4"
                  poster="https://images.pexels.com/videos/34421895/pictures/preview-0.jpg"
                  preload="metadata"
                  playsinline="true"
                  class="work-showcase-video"
                >
                  <span>Your browser does not support the video tag.</span>
                </video>
                <div id="videoOverlay" class="work-showcase-overlay">
                  <button
                    id="playBtn"
                    aria-label="Play Video"
                    class="work-showcase-play-btn"
                  >
                    <span class="work-showcase-play-icon">
                      <svg
                        width="48"
                        xmlns="http://www.w3.org/2000/svg"
                        height="48"
                        viewBox="0 0 24 24"
                      >
                        <path
                          d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="2"
                          stroke-linecap="round"
                          stroke-linejoin="round"
                        ></path>
                      </svg>
                    </span>
                  </button>
                  <div class="work-showcase-overlay-text">
                    <span class="work-showcase-tag">Featured Project</span>
                    <h3 class="work-showcase-project-title">
                      Full Property Restoration
                    </h3>
                  </div>
                </div>
                <div id="videoControls" class="work-showcase-controls">
                  <div class="work-showcase-progress-bar">
                    <div
                      id="progressFilled"
                      class="work-showcase-progress-filled"
                    ></div>
                  </div>
                  <div class="work-showcase-controls-row">
                    <div class="work-showcase-controls-left">
                      <button
                        id="miniPlayBtn"
                        aria-label="Toggle Play"
                        class="work-showcase-control-icon"
                      >
                        <svg
                          width="24"
                          xmlns="http://www.w3.org/2000/svg"
                          height="24"
                          viewBox="0 0 24 24"
                        >
                          <path
                            d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                          ></path>
                        </svg>
                      </button>
                      <span id="videoTime" class="work-showcase-time">
                        0:00 / 0:00
                      </span>
                    </div>
                    <div class="work-showcase-controls-right">
                      <button
                        id="muteBtn"
                        aria-label="Toggle Mute"
                        class="work-showcase-control-icon"
                      >
                        <svg
                          width="24"
                          xmlns="http://www.w3.org/2000/svg"
                          height="24"
                          viewBox="0 0 24 24"
                        >
                          <path
                            d="M11 4.702a.705.705 0 0 0-1.203-.498L6.413 7.587A1.4 1.4 0 0 1 5.416 8H3a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2.416a1.4 1.4 0 0 1 .997.413l3.383 3.384A.705.705 0 0 0 11 19.298zM16 9a5 5 0 0 1 0 6m3.364 3.364a9 9 0 0 0 0-12.728"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                          ></path>
                        </svg>
                      </button>
                      <button
                        id="fullscreenBtn"
                        aria-label="Toggle Fullscreen"
                        class="work-showcase-control-icon"
                      >
                        <svg
                          width="24"
                          xmlns="http://www.w3.org/2000/svg"
                          height="24"
                          viewBox="0 0 24 24"
                        >
                          <path
                            d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3m8 0h3a2 2 0 0 0 2-2v-3"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                          ></path>
                        </svg>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </section>
        <div class="work-showcase-container2">
          <div class="work-showcase-container3">
            <style>
              @media (prefers-reduced-motion: reduce) {
              .work-showcase-play-btn, .work-showcase-controls, .work-showcase-overlay {
                transition: none;
              }
              }
            </style>
          </div>
        </div>
        <div class="work-showcase-container4">
          <div class="work-showcase-container5">
            <script defer="" data-name="work-showcase-logic">
              document.addEventListener('DOMContentLoaded', function() {
                (function(){
                  const video = document.getElementById("showcaseVideo")
                  const playerContainer = document.getElementById("playerContainer")
                  const playBtn = document.getElementById("playBtn")
                  const miniPlayBtn = document.getElementById("miniPlayBtn")
                  const muteBtn = document.getElementById("muteBtn")
                  const fullscreenBtn = document.getElementById("fullscreenBtn")
                  const progressFilled = document.getElementById("progressFilled")
                  const videoTime = document.getElementById("videoTime")

                  function togglePlay() {
                    if (video.paused) {
                      video.play()
                      playerContainer.classList.add("is-playing")
                      miniPlayBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 4h4v16H6zm8 0h4v16h-4z"/></svg>'
                    } else {
                      video.pause()
                      playerContainer.classList.remove("is-playing")
                      miniPlayBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"/></svg>'
                    }
                  }

                  function formatTime(seconds) {
                    const minutes = Math.floor(seconds / 60)
                    seconds = Math.floor(seconds % 60)
                    return `${minutes}:${seconds < 10 ? "0" : ""}${seconds}`
                  }

                  function updateProgress() {
                    const percent = (video.currentTime / video.duration) * 100
                    progressFilled.style.width = `${percent}%`
                    videoTime.textContent = `${formatTime(video.currentTime)} / ${formatTime(video.duration)}`
                  }

                  function toggleMute() {
                    video.muted = !video.muted
                    if (video.muted) {
                      muteBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 4.702a.705.705 0 0 0-1.203-.498L6.413 7.587A1.4 1.4 0 0 1 5.416 8H3a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2.416a1.4 1.4 0 0 1 .997.413l3.383 3.384A.705.705 0 0 0 11 19.298zM22 9l-6 6m0-6l6 6"/></svg>'
                    } else {
                      muteBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 4.702a.705.705 0 0 0-1.203-.498L6.413 7.587A1.4 1.4 0 0 1 5.416 8H3a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2.416a1.4 1.4 0 0 1 .997.413l3.383 3.384A.705.705 0 0 0 11 19.298zM16 9a5 5 0 0 1 0 6m3.364 3.364a9 9 0 0 0 0-12.728"/></svg>'
                    }
                  }

                  function toggleFullscreen() {
                    if (!document.fullscreenElement) {
                      playerContainer.requestFullscreen().catch((err) => {
                        console.error(`Error attempting to enable full-screen mode: ${err.message}`)
                      })
                    } else {
                      document.exitFullscreen()
                    }
                  }

                  playBtn.addEventListener("click", (e) => {
                    e.stopPropagation()
                    togglePlay()
                  })

                  miniPlayBtn.addEventListener("click", (e) => {
                    e.stopPropagation()
                    togglePlay()
                  })

                  playerContainer.addEventListener("click", () => {
                    togglePlay()
                  })

                  muteBtn.addEventListener("click", (e) => {
                    e.stopPropagation()
                    toggleMute()
                  })

                  fullscreenBtn.addEventListener("click", (e) => {
                    e.stopPropagation()
                    toggleFullscreen()
                  })

                  video.addEventListener("timeupdate", updateProgress)
                  video.addEventListener("loadedmetadata", updateProgress)

                  video.addEventListener("ended", () => {
                    playerContainer.classList.remove("is-playing")
                    miniPlayBtn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"/></svg>'
                  })
                })()
              });
            </script>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
